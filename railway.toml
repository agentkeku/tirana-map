[build]
buildCommand = "cd frontend && npm install && npm run build && cd ../backend && npm install && npx prisma generate"

[deploy]
startCommand = "cd backend && npx prisma migrate deploy && node src/index.js"
healthcheckPath = "/api/sample-map"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.envs]
NODE_ENV = "production"
